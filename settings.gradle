pluginManagement {
    repositories {
        maven { url = uri('https://maven.aliyun.com/repository/google') }
        maven { url = uri('https://maven.aliyun.com/repository/central') }
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    // Prefer a single repository definition from settings for the whole build.
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    
    repositories {
        maven { url = uri('https://maven.aliyun.com/repository/google') }
        maven { url = uri('https://maven.aliyun.com/repository/central') }
        maven { url = uri('https://storage.googleapis.com/download.flutter.io') }
        google()
        mavenCentral()
        maven { url = uri('https://jitpack.io') }
    }
}

rootProject.name = "FoxyMusic"
include ':app'

// Flutter UI and Dart sources live at repo root (`pubspec.yaml`, `lib/`).
def flutterModulePath = new File(settingsDir, ".android/include_flutter.groovy")
if (flutterModulePath.exists()) {
    setBinding(new Binding([gradle: this]))
    evaluate(flutterModulePath)
}